apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: candidate-api-dev

namePrefix: ""

resources:
  - ../../base
  - namespace.yaml

patches:
  - path: patch-env.yaml
    target:
      kind: Deployment
      name: candidate-api

images:
  - name: candidate-api
    newName: placeholder.azurecr.io/candidate-api
    newTag: latest
