# ---------------------------------------------------------------------------- #
#  Main Branch CD Workflow                                                     #
#  Triggers on push to main (merge).                                           #
#  Builds, tests, pushes image to ACR, deploys to dev, promotes to test.       #
# ---------------------------------------------------------------------------- #

name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false  # Never cancel an in-flight deployment

permissions:
  contents: read
  id-token: write  # Required for Azure OIDC federation
  packages: write  # Required for NuGet push to GitHub Packages

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION: SreTakeHome.sln
  IMAGE_NAME: candidate-api
  ACR_NAME: ${{ vars.ACR_NAME }}

jobs:
  # ------------------------------------------------------------------ #
  #  Build, test, and pack                                              #
  # ------------------------------------------------------------------ #
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Test
        run: |
          dotnet test ${{ env.SOLUTION }} \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Pack Contracts NuGet
        run: |
          dotnet pack src/CandidateApi.Contracts/CandidateApi.Contracts.csproj \
            -c Release \
            --no-build \
            -o ./artifacts/packages

      - name: Push Contracts to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/packages/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full-tag=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------ #
  #  Build and push container image to ACR                              #
  # ------------------------------------------------------------------ #
  publish-image:
    name: Publish Image to ACR
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/CandidateApi/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-test.outputs.image-tag }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ------------------------------------------------------------------ #
  #  Deploy to Development                                              #
  # ------------------------------------------------------------------ #
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-test, publish-image]
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy with Kustomize
        run: |
          cd deploy/overlays/dev
          kustomize edit set image \
            candidate-api=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-test.outputs.image-tag }}
          kubectl apply -k .

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/candidate-api \
            -n candidate-api-dev \
            --timeout=300s

      - name: Smoke test
        run: |
          # Port-forward and verify health endpoint
          kubectl port-forward svc/candidate-api 8080:80 -n candidate-api-dev &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready)
          kill $PF_PID || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Smoke test failed — /health/ready returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Smoke test passed — HTTP $HTTP_CODE"

  # ------------------------------------------------------------------ #
  #  Auto-promote to Test                                               #
  # ------------------------------------------------------------------ #
  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: [build-test, deploy-dev]
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy with Kustomize
        run: |
          cd deploy/overlays/test
          kustomize edit set image \
            candidate-api=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-test.outputs.image-tag }}
          kubectl apply -k .

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/candidate-api \
            -n candidate-api-test \
            --timeout=300s

      - name: Smoke test
        run: |
          kubectl port-forward svc/candidate-api 8080:80 -n candidate-api-test &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready)
          kill $PF_PID || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Smoke test failed — /health/ready returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Smoke test passed — HTTP $HTTP_CODE"
