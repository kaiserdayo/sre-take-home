# ---------------------------------------------------------------------------- #
#  Contracts NuGet Release Workflow                                            #
#  Triggers on version tags for the contracts library.                         #
#  Packs and publishes CandidateApi.Contracts to GitHub Packages.              #
# ---------------------------------------------------------------------------- #

name: Contracts NuGet Release

on:
  push:
    tags:
      - "contracts-v*"

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/contracts-v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/CandidateApi.Contracts/CandidateApi.Contracts.csproj

      - name: Pack
        run: |
          dotnet pack src/CandidateApi.Contracts/CandidateApi.Contracts.csproj \
            -c Release \
            /p:Version=${{ steps.version.outputs.version }} \
            -o ./artifacts/packages

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/packages/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }}
