# ---------------------------------------------------------------------------- #
#  PR Validation Workflow                                                      #
#  Triggers on pull requests targeting main.                                   #
#  Builds the solution, runs tests, builds the Docker image (no push),         #
#  and validates Kubernetes manifests.                                          #
# ---------------------------------------------------------------------------- #

name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION: SreTakeHome.sln

jobs:
  # ------------------------------------------------------------------ #
  #  Build, test, and pack                                              #
  # ------------------------------------------------------------------ #
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: ./test-results/**/*.trx
          reporter: dotnet-trx

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./test-results/**/coverage.cobertura.xml
          retention-days: 7

      - name: Pack Contracts NuGet
        run: |
          dotnet pack src/CandidateApi.Contracts/CandidateApi.Contracts.csproj \
            -c Release \
            --no-build \
            -o ./artifacts/packages

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/packages/*.nupkg
          retention-days: 7

  # ------------------------------------------------------------------ #
  #  Docker image build (validation only — no push)                     #
  # ------------------------------------------------------------------ #
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/CandidateApi/Dockerfile
          push: false
          tags: candidate-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  #  Lint & validate manifests                                          #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: src/CandidateApi/Dockerfile

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate Kubernetes manifests (dev)
        run: |
          kubectl kustomize deploy/overlays/dev | kubeconform \
            -strict \
            -summary \
            -output json

      - name: Validate Kubernetes manifests (test)
        run: |
          kubectl kustomize deploy/overlays/test | kubeconform \
            -strict \
            -summary \
            -output json
